<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1050" viewBox="0 0 1600 1050" role="img" aria-labelledby="diagram-title diagram-description">
  <title id="diagram-title">Fluxograma da calculadora Consórcio x Financiamento</title>
  <desc id="diagram-description">Fluxo da ferramenta: a aplicação web coleta e calcula cenários; a planilha Excel oferece auditoria; os resultados podem retornar à R2 e compor um pacote compartilhável.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#12201a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 1 1 L 11 6 L 1 11 z" fill="#6d7b76"/>
    </marker>
    <marker id="arrow-accent" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 1 1 L 11 6 L 1 11 z" fill="#1dc077"/>
    </marker>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .title { fill: #17211e; font-size: 42px; font-weight: 700; letter-spacing: -0.8px; }
      .subtitle { fill: #5f6d68; font-size: 18px; font-weight: 400; }
      .lane { fill: #128557; font-size: 15px; font-weight: 700; letter-spacing: 2.1px; }
      .card { fill: #ffffff; stroke: #dde5e1; stroke-width: 1.5; }
      .card-dark { fill: #17211e; }
      .eyebrow { fill: #128557; font-size: 12px; font-weight: 700; letter-spacing: 1.4px; }
      .eyebrow-dark { fill: #8fe0b8; font-size: 12px; font-weight: 700; letter-spacing: 1.4px; }
      .card-title { fill: #17211e; font-size: 22px; font-weight: 700; letter-spacing: -0.2px; }
      .card-title-dark { fill: #ffffff; font-size: 22px; font-weight: 700; letter-spacing: -0.2px; }
      .body { fill: #5f6d68; font-size: 16px; font-weight: 400; }
      .body-dark { fill: #cfdbd5; font-size: 16px; font-weight: 400; }
      .small { fill: #5f6d68; font-size: 14px; font-weight: 400; }
      .small-dark { fill: #b7c8c0; font-size: 14px; font-weight: 400; }
      .pill { fill: #e9f8f0; }
      .pill-text { fill: #107a51; font-size: 12px; font-weight: 700; letter-spacing: 0.6px; }
      .connector { fill: none; stroke: #6d7b76; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .feedback { fill: none; stroke: #1dc077; stroke-width: 2.4; stroke-dasharray: 8 8; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-accent); }
      .note { fill: #307257; font-size: 14px; font-weight: 700; letter-spacing: 0.15px; }
    </style>
  </defs>

  <rect width="1600" height="1050" fill="#f7f9f8"/>
  <rect x="0" y="0" width="1600" height="12" fill="#1dc077"/>

  <text x="88" y="84" class="font title">Fluxograma · Consórcio x Financiamento</text>
  <text x="88" y="119" class="font subtitle">A calculadora web conduz a análise; a planilha Excel mantém a trilha de auditoria.</text>
  <line x1="88" y1="151" x2="1512" y2="151" stroke="#d9e3de" stroke-width="1.5"/>

  <text x="88" y="195" class="font lane">1. ENTRADAS E PREMISSAS</text>
  <text x="594" y="195" class="font lane">2. NÚCLEO DE CÁLCULO</text>
  <text x="1122" y="195" class="font lane">3. DECISÃO E AUDITORIA</text>

  <!-- Conectores principais: desenhados antes dos cartões para preservar a leitura. -->
  <path d="M283 364 V404" class="connector"/>
  <path d="M283 564 V606" class="connector"/>
  <path d="M478 692 H536 V346 H594" class="connector"/>
  <path d="M804 442 V516" class="connector"/>
  <path d="M1014 636 H1066 V310 H1122" class="connector"/>
  <path d="M1014 686 H1066 V529 H1122" class="connector"/>
  <path d="M1317 620 V662" class="connector"/>

  <!-- Retorno de revisão da auditoria para as premissas. -->
  <path d="M1122 570 H1066 V865 H52 V294 H88" class="feedback"/>
  <text x="576" y="891" text-anchor="middle" class="font note">REVISÃO DE PREMISSAS, CONTRATOS E CUSTOS REALIMENTA A SIMULAÇÃO</text>

  <!-- Coluna 1: dados de entrada. -->
  <g filter="url(#shadow)">
    <rect x="88" y="224" width="390" height="140" rx="20" class="card"/>
  </g>
  <rect x="112" y="249" width="36" height="36" rx="10" fill="#e9f8f0"/>
  <path d="M123 258h14M123 267h14M123 276h9" fill="none" stroke="#128557" stroke-width="2.2" stroke-linecap="round"/>
  <text x="164" y="258" class="font eyebrow">CENÁRIO</text>
  <text x="112" y="314" class="font card-title">Dados do bem e do cliente</text>
  <text x="112" y="340" class="font body">Preço, entrada, caixa, horizonte, taxas,</text>
  <text x="112" y="362" class="font body">inflação, aluguel/renda e disponibilidade.</text>

  <g filter="url(#shadow)">
    <rect x="88" y="404" width="390" height="160" rx="20" class="card"/>
  </g>
  <rect x="112" y="429" width="36" height="36" rx="10" fill="#e9f8f0"/>
  <path d="M122 440l5 5 10-11M122 454l5 5 10-11" fill="none" stroke="#128557" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="164" y="438" class="font eyebrow">ALTERNATIVAS</text>
  <text x="112" y="494" class="font card-title">Estratégias e regras</text>
  <text x="112" y="520" class="font body">Financiamento PRICE/SAC, amortização,</text>
  <text x="112" y="542" class="font body">investir + alugar, consórcio e carta contemplada.</text>

  <g filter="url(#shadow)">
    <rect x="88" y="606" width="390" height="172" rx="20" class="card-dark"/>
  </g>
  <rect x="112" y="631" width="36" height="36" rx="10" fill="#24463a"/>
  <rect x="120" y="639" width="20" height="14" rx="2" fill="none" stroke="#8fe0b8" stroke-width="2"/>
  <path d="M126 659h8" stroke="#8fe0b8" stroke-width="2" stroke-linecap="round"/>
  <text x="164" y="640" class="font eyebrow-dark">INTERFACE PRINCIPAL</text>
  <text x="112" y="696" class="font card-title-dark">Aplicação web estática</text>
  <text x="112" y="722" class="font body-dark">Recebe as premissas, recalcula na hora e</text>
  <text x="112" y="745" class="font body-dark">pode importar/devolver uma análise à R2.</text>

  <!-- Coluna 2: cálculo em navegador. -->
  <g filter="url(#shadow)">
    <rect x="594" y="250" width="420" height="192" rx="24" class="card-dark"/>
  </g>
  <rect x="620" y="276" width="38" height="38" rx="11" fill="#24463a"/>
  <path d="M630 287h18M630 295h18M630 303h10" fill="none" stroke="#8fe0b8" stroke-width="2.2" stroke-linecap="round"/>
  <text x="676" y="288" class="font eyebrow-dark">MODELO CANÔNICO NO NAVEGADOR</text>
  <text x="620" y="346" class="font card-title-dark">Normalização mensal</text>
  <text x="620" y="373" class="font body-dark">Limites, datas, taxas e condições de uso são</text>
  <text x="620" y="396" class="font body-dark">padronizados antes de formar os fluxos financeiros.</text>

  <g filter="url(#shadow)">
    <rect x="594" y="516" width="420" height="300" rx="24" class="card"/>
  </g>
  <rect x="620" y="542" width="38" height="38" rx="11" fill="#e9f8f0"/>
  <path d="M630 568v-12M639 568v-20M648 568v-8" fill="none" stroke="#128557" stroke-width="2.3" stroke-linecap="round"/>
  <text x="676" y="553" class="font eyebrow">SIMULAÇÃO</text>
  <text x="620" y="609" class="font card-title">Motor de cenários</text>
  <text x="620" y="636" class="font body">Gera fluxos mensais comparáveis para as cinco</text>
  <text x="620" y="658" class="font body">estratégias e aplica as premissas de cada uma.</text>

  <rect x="620" y="683" width="176" height="30" rx="15" class="pill"/>
  <text x="708" y="703" text-anchor="middle" class="font pill-text">CAIXA · RESERVA · DÍVIDA</text>
  <rect x="806" y="683" width="182" height="30" rx="15" class="pill"/>
  <text x="897" y="703" text-anchor="middle" class="font pill-text">PATRIMÔNIO · VIABILIDADE</text>
  <line x1="620" y1="735" x2="988" y2="735" stroke="#dbe6e1" stroke-width="1.3"/>
  <text x="620" y="762" class="font small">Guarda parcelas futuras da carta contemplada mesmo</text>
  <text x="620" y="783" class="font small">depois do horizonte de comparação (cronograma até 959 meses).</text>

  <!-- Coluna 3: consumo dos resultados. -->
  <g filter="url(#shadow)">
    <rect x="1122" y="224" width="390" height="172" rx="20" class="card"/>
  </g>
  <rect x="1146" y="249" width="36" height="36" rx="10" fill="#e9f8f0"/>
  <path d="M1155 275l7-8 6 4 7-12" fill="none" stroke="#128557" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="1198" y="258" class="font eyebrow">RESULTADO PRINCIPAL</text>
  <text x="1146" y="314" class="font card-title">Painel web de decisão</text>
  <text x="1146" y="340" class="font body">Compara patrimônio, custo, acesso, dívida,</text>
  <text x="1146" y="362" class="font body">viabilidade e premissas em linguagem de negócio.</text>

  <g filter="url(#shadow)">
    <rect x="1122" y="438" width="390" height="182" rx="20" class="card"/>
  </g>
  <rect x="1146" y="463" width="36" height="36" rx="10" fill="#e9f8f0"/>
  <path d="M1154 473h20v16h-20zM1158 478h12M1158 484h8" fill="none" stroke="#128557" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="1198" y="472" class="font eyebrow">CAMADA DE CONFERÊNCIA</text>
  <text x="1146" y="528" class="font card-title">Planilha Excel de auditoria</text>
  <text x="1146" y="554" class="font body">Registra premissas, cronogramas, motor e</text>
  <text x="1146" y="576" class="font body">checks para conferir a lógica e os resultados.</text>
  <rect x="1146" y="588" width="114" height="22" rx="11" class="pill"/>
  <text x="1203" y="604" text-anchor="middle" class="font pill-text">NÃO É A INTERFACE</text>

  <g filter="url(#shadow)">
    <rect x="1122" y="662" width="390" height="154" rx="20" class="card-dark"/>
  </g>
  <rect x="1146" y="687" width="36" height="36" rx="10" fill="#24463a"/>
  <path d="M1154 697h20v16h-20zM1159 702h10M1159 708h10" fill="none" stroke="#8fe0b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="1198" y="696" class="font eyebrow-dark">DISTRIBUIÇÃO</text>
  <text x="1146" y="752" class="font card-title-dark">Pacote para o time</text>
  <text x="1146" y="778" class="font body-dark">Web estática · XLSX · guias · ZIP · repositório GitHub.</text>

  <!-- Rodapé de arquitetura. -->
  <rect x="88" y="925" width="1424" height="74" rx="18" fill="#edf6f1" stroke="#d8e8df" stroke-width="1.2"/>
  <circle cx="122" cy="962" r="17" fill="#1dc077"/>
  <path d="M114 962l6 6 11-13" fill="none" stroke="#ffffff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="156" y="956" class="font card-title" style="font-size:18px">Diretriz de uso</text>
  <text x="156" y="980" class="font body">A web é a fonte operacional da decisão; o Excel dá transparência, rastreabilidade e conferência. Arquitetura sem API, banco ou persistência de dados.</text>
</svg>
